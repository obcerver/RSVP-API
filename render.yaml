services:
  - type: web
    name: rsvp-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: APP_NAME
        value: RSVP-API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: rsvp-api
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: rsvp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: rsvp-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: rsvp-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: rsvp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: rsvp-db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: array
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: rsvp-db
    plan: free
    databaseName: rsvp_checklist
